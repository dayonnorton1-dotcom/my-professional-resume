name: My first pipeline

on:
    push: 
        branches: ["main"]

jobs:
    build:
        runs-on: ubuntu-latest # macos, windows-latest
        steps:
            - name: Clone the code
              uses: actions/checkout@v4
            - name: Build image
              run:
                docker build -t dayon101/cicd-portfolio .
            - name: Docker login
              uses: docker/login-action@v3
              with:
                username: dayon101
                password: ${{ secerts.DOCKER_PASS }}
            - name: Push image
              run: 
                docker push dayon101/cicd-portfolio 


                